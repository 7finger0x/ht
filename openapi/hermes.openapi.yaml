          type: string
          minLength: 1
          maxLength: 100
        reason:
          type: string
          minLength: 1
          maxLength: 1000
        evidence_refs:
          type: array
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 300
    CircuitBreakerResetRequest:
      type: object
      additionalProperties: false
      required: [reason_code, reason, evidence_refs]
      properties:
        reason_code:
          type: string
          minLength: 1
          maxLength: 100
        reason:
          type: string
          minLength: 1
          maxLength: 1000
        evidence_refs:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 300
    EvidenceReference:
      type: object
      additionalProperties: false
      required: [kind, id, digest]
      properties:
        kind:
          type: string
          maxLength: 100
        id:
          type: string
          maxLength: 200
        digest:
          $ref: '#/components/schemas/Digest'
        created_at:
          anyOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
    EvidenceManifest:
      type: object
      additionalProperties: false
      required:
        - execution_id
        - protocol_version
        - application_version
        - source_commit
        - evidence
        - root_digest
        - generated_at
      properties:
        execution_id:
          $ref: '#/components/schemas/Uuid'
        protocol_version:
          type: string
        application_version:
          type: string
        source_commit:
          type: string
          pattern: '^[a-f0-9]{7,64}$'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceReference'
        root_digest:
          $ref: '#/components/schemas/Digest'
        anchored_reference:
          type: [string, 'null']
          maxLength: 300
        generated_at:
          $ref: '#/components/schemas/Timestamp'
    AuditActorType:
      type: string
      enum: [principal, service, signer, venue, system]
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - occurred_at
        - action
        - result
        - resource_type
        - resource_id
        - correlation_id
        - payload
      properties:
        id:
          type: string
        occurred_at:
          $ref: '#/components/schemas/Timestamp'
        action:
          type: string
        result:
          type: string
          enum: [SUCCESS, DENIED, FAILED, PENDING]
        resource_type:
          type: string
        resource_id:
          type: string
        correlation_id:
          type: string
        payload:
          type: object
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, detail, request_id]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
          maxLength: 200
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          pattern: '^[A-Z0-9_]{3,100}$'
        detail:
          type: string
          maxLength: 2000
        request_id:
          type: string
          minLength: 8
          maxLength: 128
        errors:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                maxLength: 300
              code:
                type: string
                maxLength: 100
              message:
                type: string
                maxLength: 1000
