# Simulation-safe example. Do not enable LIVE without deployment-specific review and tests.
version: 1.0.0-draft
mode: SIMULATION
consensus:
  algorithm_version: antigravity-consensus/1.0.0
  minimum_eligible_agents: 3
  minimum_quorum_weight: "0.75"
  minimum_support_weight: "0.80"
  minimum_weighted_confidence: "0.60"
  maximum_opposition_weight: "0.15"
  maximum_abstain_weight: "0.25"
  maximum_assessment_age_seconds: 30
  agents:
    - agent_id: technical-momentum
      weight: "0.35"
      minimum_data_quality: "0.90"
      mandatory: true
      approved_versions: ["3.2.0"]
    - agent_id: technical-mean-reversion
      weight: "0.20"
      minimum_data_quality: "0.90"
      mandatory: false
      approved_versions: ["2.1.0"]
    - agent_id: macro-regime
      weight: "0.25"
      minimum_data_quality: "0.85"
      mandatory: true
      approved_versions: ["1.4.0"]
    - agent_id: narrative-sentiment
      weight: "0.20"
      minimum_data_quality: "0.80"
      mandatory: false
      approved_versions: ["1.3.0"]
risk:
  base_currency: USD
  max_order_notional: "1000.00"
  max_order_nav_fraction: "0.0100"
  max_position_nav_fraction: "0.0500"
  max_gross_exposure_nav_fraction: "0.2500"
  max_net_exposure_nav_fraction: "0.1500"
  max_leverage: "1.0000"
  max_daily_loss_nav_fraction: "0.0100"
  max_drawdown_nav_fraction: "0.0300"
  max_slippage_bps: 30
  max_price_impact_bps: 25
  min_liquidity_multiple: "25.0"
  max_quote_age_seconds: 15
  max_portfolio_age_seconds: 15
  max_clock_skew_seconds: 5
  max_fee_notional_fraction: "0.0050"
  unknown_rule_result: REJECT
approval:
  required_above_notional: "500.00"
  dual_control: true
  expires_after_seconds: 300
finality:
  evm_confirmations: 12
  solana_commitment: finalized
  ambiguous_submission_pause: true
