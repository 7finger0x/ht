# openapi-python-client configuration for the Hermes API SDK.
# Reference: https://github.com/openapi-generators/openapi-python-client

project_name_override: hermes-client
package_name_override: hermes_client
package_version_override: "1.0.0.dev0"

# Use attrs-based models for strict typing
field_prefix: field_

# Generate a fully-typed, httpx-based async client
http_timeout: 30.0

# All decimal/monetary fields are returned as strings by the API;
# do not auto-coerce to float.
overrides:
  - type: str
    pattern: "^[0-9]+([.][0-9]+)?$"
